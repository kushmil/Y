<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff; /* pure white background taaki GIF seamlessly blend ho jaye */
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px 0 20px; /* bottom padding zero rakhi hai taaki GIF bottom se touch rahe */
            text-align: center;
            overflow-x: hidden;
        }

        .error-container {
            max-width: 650px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: calc(100vh - 40px);
        }

        /* Content Area (Top) */
        .content {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 800;
            color: #ff9f43; /* Caveman dress color scheme */
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            color: #718096;
            margin-bottom: 30px;
            max-width: 480px;
            line-height: 1.6;
            margin-left: auto;
            margin-right: auto;
        }

        /* Button styling */
        .btn-home {
            display: inline-block;
            padding: 12px 35px;
            background-color: #2c3e50; /* Rock/stone dark tone */
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(44, 62, 80, 0.15);
        }

        .btn-home:hover {
            background-color: #ff9f43; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 159, 67, 0.3);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        /* GIF Container (Bottom) */
        .illustration-container {
            width: 100%;
            max-width: 550px;
            margin-top: auto; /* Ise bottom me push karne ke liye */
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .illustration-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 480px) {
            h1 {
                font-size: 4rem;
            }
            h2 {
                font-size: 1.3rem;
            }
            p {
                font-size: 0.95rem;
            }
            .btn-home {
                padding: 10px 28px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <!-- Text Content Area -->
        <div class="content">
            <h1>404</h1>
            <h2>Oops! Connection Toot Gaya...</h2>
            <p>Humne is page ko dhoodhne ki koshish ki, lekin hum stone age tak pahunch gaye jahan shayad internet abhi tak invent nahi hua hai.</p>
            
            <!-- Home Screen Redirect Button -->
            <a href="index.html" class="btn-home">Home Screen Par Chalein</a>
        </div>

        <!-- GIF at the Bottom -->
        <div class="illustration-container">
            <img src="eror.gif" alt="Offline Caveman">
        </div>
    </div>

</body>
</html>
